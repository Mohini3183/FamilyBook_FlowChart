<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FamilyBook — Application Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --color-text-primary: #18152B;
    --color-text-secondary: #5F5980;
    --color-border-tertiary: rgba(95,89,128,0.18);
    --font-sans: 'Inter', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #EDE9FF;
      --color-text-secondary: #A49DC0;
      --color-border-tertiary: rgba(165,157,192,0.18);
    }
    body { background: #18152B; }
    .card { background: #221E3A; border-color: rgba(165,157,192,0.15); }
    footer { color: #5F5980; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: #F6F5FF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 24px 56px;
  }
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--color-text-primary);
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 6px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid rgba(91,79,207,0.12);
    box-shadow: 0 4px 24px rgba(91,79,207,0.09);
    padding: 36px 32px;
    max-width: 760px;
    width: 100%;
  }
  svg text { font-family: var(--font-sans); }

  /* Color ramps */
  .c-gray rect, .c-gray polygon { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text.th { fill: #444441; }
  .c-gray text.ts { fill: #5F5E5A; }
  .c-teal rect, .c-teal polygon { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text.th { fill: #085041; }
  .c-teal text.ts { fill: #0F6E56; }
  .c-purple rect, .c-purple polygon { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text.th { fill: #3C3489; }
  .c-purple text.ts { fill: #534AB7; }
  .c-coral rect, .c-coral polygon { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text.th { fill: #712B13; }
  .c-coral text.ts { fill: #993C1D; }

  @media (prefers-color-scheme: dark) {
    .c-gray rect, .c-gray polygon { fill: #444441; stroke: #B4B2A9; }
    .c-gray text.th { fill: #F1EFE8; }
    .c-gray text.ts { fill: #D3D1C7; }
    .c-teal rect, .c-teal polygon { fill: #085041; stroke: #5DCAA5; }
    .c-teal text.th { fill: #E1F5EE; }
    .c-teal text.ts { fill: #9FE1CB; }
    .c-purple rect, .c-purple polygon { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple text.th { fill: #EEEDFE; }
    .c-purple text.ts { fill: #CECBF6; }
    .c-coral rect, .c-coral polygon { fill: #712B13; stroke: #F0997B; }
    .c-coral text.th { fill: #FAECE7; }
    .c-coral text.ts { fill: #F5C4B3; }
  }

  text.th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  text.ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }

  .node { cursor: pointer; }
  .node:hover rect, .node:hover polygon { opacity: 0.85; }

  footer {
    margin-top: 32px;
    font-size: 12px;
    color: #A49DC0;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <h1>FamilyBook — Application Workflow</h1>
  <p>Mohini Sultana Mukta · 201-15-3183 · Daffodil International University</p>
</header>

<div class="card">

<!-- START PILL -->
